<!DOCTYPE html>
<html>
<head>
  <title>Stock Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>📈 Stock Simulator</h1>

    <div class="card">
      <h2>User Account</h2>
      <input id="usernameInput" placeholder="Enter username">
      <button onclick="loginUser()">Login / Create Account</button>
      <p id="currentUser"></p>
      <p id="cashDisplay"></p>
      <p id="netWorthDisplay"></p>
    </div>

    <div class="card">
      <h2>Search Stocks</h2>
      <input id="stockSearch" placeholder="Apple, Tesla, AAPL...">
      <button onclick="searchStock()">Search</button>

      <h2 id="stockName">No stock selected</h2>
      <p id="stockSymbol"></p>
      <h1 id="stockPrice">$0.00</h1>
      <p id="marketStatus"></p>

      <input id="sharesInput" type="number" placeholder="Shares" min="1">
      <button onclick="buyShares()">Buy</button>
      <button onclick="sellShares()">Sell</button>
      <button onclick="addToWatchlist()">Add to Watchlist</button>
    </div>

    <div class="card">
      <h2>Stock Chart</h2>
      <canvas id="stockChart" width="400" height="200"></canvas>
    </div>

    <div class="card">
      <h2>Portfolio</h2>
      <div id="portfolioList"></div>
    </div>

    <div class="card">
      <h2>Watchlist</h2>
      <div id="watchlist"></div>
    </div>

    <div class="card">
      <h2>Leaderboard</h2>
      <div id="leaderboard"></div>
    </div>

    <div class="card">
      <h2>Badges</h2>
      <div id="badges"></div>
    </div>

    <div class="card">
      <h2>News Feed</h2>
      <div id="newsFeed"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
