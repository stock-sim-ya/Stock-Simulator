<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Simulator</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN PAGE -->
  <div id="loginPage" class="login-bg">
    <div class="login-card">

      <h1>📈 Stock Simulator</h1>
      <p>Trade stocks with virtual money.</p>

      <input
        type="text"
        id="usernameInput"
        placeholder="Username"
      >

      <input
        type="password"
        id="passwordInput"
        placeholder="Password"
      >

      <button onclick="createAccount()">
        Login / Create Account
      </button>

    </div>
  </div>

  <!-- MAIN APP -->
  <div id="appPage" class="hidden">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <h2>📊 Stock Sim</h2>

      <button onclick="showPage('stockBuying')">
        Buy Stocks
      </button>

      <button onclick="showPage('portfolio')">
        Portfolio
      </button>

      <button onclick="showPage('watchlist')">
        Watchlist
      </button>

      <button onclick="showPage('leaderboard')">
        Leaderboard
      </button>

      <button onclick="showPage('history')">
        History
      </button>

      <button onclick="showPage('badges')">
        Badges
      </button>

      <button onclick="showPage('news')">
        News
      </button>

      <button onclick="logout()">
        Logout
      </button>

    </div>

    <!-- CONTENT -->
    <main>

      <!-- BUY STOCKS PAGE -->
      <section
        <section id="stockBuying" class="page hidden page-bg-search">

  <h1>Buy Stocks</h1>

  <p id="welcomeText"></p>

  <h2>
    Cash:
    $<span id="cashDisplay">10000</span>
  </h2>

  <input
    id="stockSearch"
    placeholder="Search company or symbol"
  >

  <button onclick="searchStock()">
    Find Stock
  </button>

  <div id="stockResult"></div>

</section>
        class="page hidden page-bg-search"
      >

        <h1>Buy Stocks</h1>

        <p id="welcomeText"></p>

        <h2>
          Cash:
          $
          <span id="cashDisplay">
            10000
          </span>
        </h2>

        <br>

        <input
          id="stockSearch"
          placeholder="Search company name or symbol"
        >

        <button onclick="searchStock()">
          Find Stock
        </button>

        <div id="stockResult"></div>

      </section>

      <!-- PORTFOLIO PAGE -->
      <section
        id="portfolio"
        class="page hidden page-bg-portfolio"
      >

        <h1>Portfolio</h1>

        <div id="portfolioList"></div>

      </section>

      <!-- WATCHLIST PAGE -->
      <section
        id="watchlist"
        class="page hidden page-bg-watchlist"
      >

        <h1>Watchlist</h1>

        <div id="watchlistList"></div>

      </section>

      <!-- LEADERBOARD PAGE -->
      <section
        id="leaderboard"
        class="page hidden page-bg-leaderboard"
      >

        <h1>Leaderboard</h1>

        <ol id="leaderboardList"></ol>

      </section>

      <!-- HISTORY PAGE -->
      <section
        id="history"
        class="page hidden page-bg-history"
      >

        <h1>Trading History</h1>

        <div id="historyList"></div>

      </section>

      <!-- BADGES PAGE -->
      <section
        id="badges"
        class="page hidden page-bg-badges"
      >

        <h1>Achievements</h1>

        <div id="badgesList"></div>

      </section>

      <!-- NEWS PAGE -->
      <section
        id="news"
        class="page hidden page-bg-news"
      >

        <h1>Market News</h1>

        <div class="card">
          News from your API can appear here later.
        </div>

      </section>

    </main>

  </div>

  <script src="script.js"></script>

</body>
</html>
